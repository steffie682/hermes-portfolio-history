name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16.4-bookworm@sha256:9a70e4d1c03a5066080292db2dd95ee3965d3651316e21989fa0935afb8ce8ca
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_history_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d portfolio_history_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_ADMIN_URL: postgresql://postgres:postgres@127.0.0.1:5432/portfolio_history_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit:prod
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - name: Verify migration files are current
        run: |
          set -o pipefail
          npm run db:generate
          git status --porcelain --untracked-files=all -- drizzle | tee /tmp/drizzle-status
          test ! -s /tmp/drizzle-status
      - run: npm run build
